<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      padding: 16px;
    }
    h1 { font-size: 16px; margin-bottom: 12px; }
    h2 { font-size: 13px; font-weight: 600; margin: 16px 0 8px; color: #374151; }
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 8px; margin-bottom: 12px;
    }
    .status-bar.ok { background: #f0fdf4; border: 1px solid #bbf7d0; }
    .status-bar.error { background: #fef2f2; border: 1px solid #fecaca; }
    .status-bar.warn { background: #fffbeb; border: 1px solid #fde68a; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #f59e0b; }
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 8px 0; }
    .metric { padding: 8px; background: #f9fafb; border-radius: 6px; }
    .metric-val { font-size: 18px; font-weight: 700; color: #111827; }
    .metric-label { font-size: 11px; color: #6b7280; }
    label { display: block; font-weight: 500; margin-bottom: 4px; color: #374151; }
    input {
      width: 100%; padding: 8px 10px; border: 1px solid #d1d5db;
      border-radius: 6px; font-size: 13px; margin-bottom: 10px;
    }
    input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.15); }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    button {
      padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 6px;
      background: #fff; cursor: pointer; font-size: 13px; font-weight: 500;
    }
    button:hover { background: #f9fafb; }
    button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    button.primary:hover { background: #1d4ed8; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button.small { padding: 4px 10px; font-size: 11px; }
    .sync-btn { width: 100%; }
    .tabs { display: flex; border-bottom: 2px solid #e5e7eb; margin-bottom: 12px; }
    .tab {
      padding: 8px 16px; cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; font-weight: 500; color: #6b7280;
    }
    .tab.active { color: #2563eb; border-bottom-color: #2563eb; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .feedback {
      font-size: 12px; margin-top: 8px; padding: 8px 10px; border-radius: 6px; display: none;
    }
    .feedback.ok { display: block; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .feedback.error { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .feedback.loading { display: block; background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .log-container {
      background: #1e1e1e; border-radius: 6px; margin-top: 10px; overflow: hidden;
    }
    .log-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 10px; background: #2d2d2d; border-bottom: 1px solid #3e3e3e;
    }
    .log-header span { color: #9ca3af; font-size: 11px; font-weight: 600; }
    #log {
      font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 10px;
      color: #d4d4d4; padding: 8px 10px; max-height: 180px; overflow-y: auto;
      white-space: pre; line-height: 1.5;
    }
    .log-line { display: block; }
    .log-line.error { color: #f87171; }
    .log-line.warn { color: #fbbf24; }
    .log-line.debug { color: #6b7280; }
  </style>
</head>
<body>
  <h1>Avigilon Unity Sync</h1>

  <div class="tabs">
    <div class="tab active" data-tab="status">Status</div>
    <div class="tab" data-tab="config">Settings</div>
    <div class="tab" data-tab="logs">Logs</div>
  </div>

  <!-- Status Tab -->
  <div id="tab-status" class="tab-content active">
    <div id="bridge-status" class="status-bar warn">
      <div class="dot yellow"></div>
      <span>Checking bridge...</span>
    </div>

    <div id="sync-status" class="status-bar warn">
      <div class="dot yellow"></div>
      <span>No sync data yet</span>
    </div>

    <div class="metrics" id="metrics" style="display:none">
      <div class="metric"><div class="metric-val" id="m-identities">-</div><div class="metric-label">Identities</div></div>
      <div class="metric"><div class="metric-val" id="m-cards">-</div><div class="metric-label">AG Cards</div></div>
      <div class="metric"><div class="metric-val" id="m-new">-</div><div class="metric-label">Provisioned</div></div>
      <div class="metric"><div class="metric-val" id="m-deleted">-</div><div class="metric-label">Deleted</div></div>
    </div>

    <button class="primary sync-btn" id="btn-sync">Run Sync Now</button>
  </div>

  <!-- Config Tab -->
  <div id="tab-config" class="tab-content">
    <h2>Plasec / Avigilon Unity</h2>
    <p style="font-size:11px;color:#6b7280;margin-bottom:8px">Configured in the bridge app (localhost:19780)</p>

    <h2>AccessGrid</h2>
    <label>Account ID</label>
    <input id="ag-account" type="text" placeholder="your-account-id">
    <label>API Secret</label>
    <input id="ag-secret" type="password" placeholder="your-api-secret">
    <label>Template ID</label>
    <input id="ag-template" type="text" placeholder="template-uuid">

    <div class="btn-row">
      <button class="primary" id="btn-save">Save</button>
      <button id="btn-test-bridge">Test Bridge</button>
    </div>
    <div id="bridge-feedback" class="feedback"></div>
  </div>

  <!-- Logs Tab -->
  <div id="tab-logs" class="tab-content">
    <div class="log-container">
      <div class="log-header">
        <span>Service Worker Log</span>
        <button class="small" id="btn-copy-log">Copy</button>
      </div>
      <div id="log"></div>
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="small" id="btn-refresh-log">Refresh</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
